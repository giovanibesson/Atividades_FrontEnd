<!DOCTYPE html>
<html lang="en">

    <link rel="stylesheet" href="forms.css">
    <title>Formulário</title>

<body>
    <div class="container">
        <h1>Formulário - Programação Orientada a Objetos</h1>

        <form>
            <h2>Perguntas sobre o conteúdo</h2>

            <label>1) O que é um objeto?</label>
            <textarea required></textarea>
            <label>2) O que são atributos?</label>
            <textarea required></textarea>
            <label>3) O que é uma classe?</label>
            <textarea required></textarea>
            <label>4) O que significa instanciar?</label>
            <textarea required></textarea>

            <h2>Avaliação do Desenvolvimento</h2>
            <label>1) O conteúdo ficou claro?</label>
            <select required>
                <option value="">Selecione</option>
                <option>Sim</option>
                <option>Pode Melhorar</option>
                <option>Não</option>
            </select>

            <label>Deixe sua sugestão de melhoria:</label>
            <textarea></textarea>

            <button type="submit">Enviar Respostas</button>

        </form>

        <button type="button" class="voltar" onclick="window.location.href='index.html'">Voltar para o início
        </button>
    </div>
